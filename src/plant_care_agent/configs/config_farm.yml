functions:
  # --- 共享工具 ---
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/farm
    - ./data
  # --- 农业专属工具 ---
  sensor_monitor:
    _type: sensor_monitor
    farm_dir: ./data/farm
  farm_automation:
    _type: farm_automation
    farm_dir: ./data/farm
  farm_chart:
    _type: farm_chart
    farm_dir: ./data/farm
    output_dir: ./data/farm/charts
  farm_report:
    _type: farm_report
    farm_dir: ./data/farm
    output_dir: ./data/farm/reports
  # --- 内层 Agent ---
  inner_react_farm:
    _type: react_agent
    tool_names:
    - weather_forecast
    - plant_image_analyzer
    - current_datetime
    - web_search
    - shell_tool
    - skill_tools
    - read_project_file
    - sensor_monitor
    - farm_automation
    - farm_journal
    - farm_chart
    - farm_report
    llm_name: local_llm
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 5
    # system_prompt 由 prompts/ 目录统一管理，启动前自动组装到 .generated/ 目录。
    # 请勿手动编辑此字段。修改 prompts/*.md 后运行: python scripts/assemble_config.py --all
    # 或直接使用 ./scripts/start.sh --farm 启动（自动 assemble）。
    system_prompt: __LOAD_FROM_PROMPTS__
function_groups:
  farm_journal:
    _type: farm_journal
    farm_dir: ./data/farm
# ── LLM 配置（与 config.yml 格式一致，详见其中注释） ──────────────────────
llms:
  local_llm:
    _type: openai
    # --- 方式一：本地部署（Ollama） ---
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    # --- 方式二：外部 API（取消注释并填入你的密钥） ---
    # api_key: sk-your-api-key-here
    # base_url: https://api.openai.com/v1          # OpenAI
    # base_url: https://api.deepseek.com/v1        # DeepSeek
    # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 阿里云百炼
    # model_name: gpt-4o                           # 或 deepseek-chat / qwen-plus 等
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    # --- 方式一：本地部署（Ollama） ---
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    # --- 方式二：外部 API ---
    # api_key: sk-your-api-key-here
    # base_url: https://api.openai.com/v1
    # model_name: gpt-4o
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: farm_memory_wrapper
  inner_agent_name: inner_react_farm
  farm_dir: ./data/farm
  inject_skills_index: true
  skills_index_max_chars: 4000
  file_log_path: ./data/logs/farm_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Farm workflow with sensor data and operation management
