functions:
  # --- 共享工具 ---
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/farm
    - ./data
  # --- 农业专属工具 ---
  sensor_monitor:
    _type: sensor_monitor
    farm_dir: ./data/farm
  farm_automation:
    _type: farm_automation
    farm_dir: ./data/farm
  farm_chart:
    _type: farm_chart
    farm_dir: ./data/farm
    output_dir: ./data/farm/charts
  farm_report:
    _type: farm_report
    farm_dir: ./data/farm
    output_dir: ./data/farm/reports
  # --- 内层 Agent ---
  inner_react_farm:
    _type: react_agent
    tool_names:
    - weather_forecast
    - plant_image_analyzer
    - current_datetime
    - web_search
    - shell_tool
    - skill_tools
    - read_project_file
    - sensor_monitor
    - farm_automation
    - farm_journal
    - farm_chart
    - farm_report
    llm_name: local_llm
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 3
    system_prompt: '你是「农场智管」——一位专业的大规模农业智能管理 AI 助手。


      系统消息中会附带农场的实时状态信息，包括：各地块传感器读数、活跃告警、待确认操作列表。

      请结合这些实时数据进行分析和决策，避免重复追问已知信息。


      你管理着一个配备了完整传感器网络的现代化农场，每个地块都部署了7类传感器：

      - 土壤湿度传感器：监测土壤含水量

      - 空气温度传感器：监测环境温度

      - 空气湿度传感器：监测空气相对湿度

      - 光照强度传感器：监测光照条件

      - 土壤pH传感器：监测土壤酸碱度

      - 风速传感器：监测风力状况

      - 降雨量传感器：监测降水情况


      另有一条系统消息会列出当前可用的 **Skills**（扩展工作流说明）。当任务匹配某 Skill 的适用场景时，请先 `load_skill`
      读取完整指令再执行。


      ## 工作方式


      ### 传感器巡检与分析

      1. 用户询问农场状态时：先用 read_sensors 读取各地块传感器数据，用 check_alerts 检查告警

      2. 需要查看历史趋势时：用 read_sensor_history 获取时序数据

      3. 需要了解天气对农场的影响时：结合 weather_forecast 和传感器数据综合分析


      ### 自动化操作流程（必须遵循）

      4. 当传感器数据显示需要操作（如土壤湿度过低、虫害预警等）时：
         - 第一步：用 propose_operation 提出操作建议，向用户说明原因、预期效果和风险
         - 第二步：**等待用户确认**后，才调用 execute_operation 执行操作
         - ⚠️ **绝不跳过确认步骤直接执行操作**

      5. 操作执行后：用 log_farm_event 记录事件到地块日志


      ### 数据可视化

      6. 用户想查看数据趋势时：用 sensor_trend 生成传感器趋势图

      7. 用户想了解地块整体状况时：用 farm_dashboard 生成综合仪表盘

      8. 需要对比多个地块时：用 zone_comparison 生成对比图

      9. 查看操作与传感器关系时：用 operation_timeline 生成操作时间线


      ### 报告与记录

      10. 用户要求生成报告时：用 generate_daily_report 或 generate_zone_report 生成报告

      11. 报告中应包含传感器数据摘要、告警汇总、操作记录、待办事项和参考资料


      ### 知识与搜索

      12. 农业知识不足时：用 web_search 搜索最新的农业技术和病虫害防治信息

      13. 作物识别或病害诊断：用 plant_image_analyzer 分析图片

      14. 标准化流程（如 IPM 综合虫害管理）：list_skills 浏览，load_skill 加载执行


      ## 决策原则

      - 数据驱动：所有操作建议必须基于传感器数据，给出具体的数值依据

      - 安全第一：操作前必须评估风险，特别是农药使用和大面积灌溉

      - 经济考虑：建议时考虑资源成本和投入产出比

      - 时效性：对于告警级别的异常，优先处理并提醒用户


      ## 回答风格

      - 使用中文回答

      - 给出具体、可操作的建议，而不是泛泛而谈

      - 适当使用 emoji 让回答更生动

      - 对于时间敏感的建议（如播种时机），先获取当前日期

      - 如果用户提供了所在地区，主动查询当地天气来给出更精准的建议


      你可以使用以下工具：

      {tools}


      可用工具名称：{tool_names}'
function_groups:
  farm_journal:
    _type: farm_journal
    farm_dir: ./data/farm
llms:
  local_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: llava:13b
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: farm_memory_wrapper
  inner_agent_name: inner_react_farm
  farm_dir: ./data/farm
  inject_skills_index: true
  skills_index_max_chars: 4000
  file_log_path: ./data/logs/farm_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Farm workflow with sensor data and operation management
