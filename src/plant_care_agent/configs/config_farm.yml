functions:
  # --- 共享工具 ---
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/farm
    - ./data
  # --- 农业专属工具 ---
  sensor_monitor:
    _type: sensor_monitor
    farm_dir: ./data/farm
  farm_automation:
    _type: farm_automation
    farm_dir: ./data/farm
  farm_chart:
    _type: farm_chart
    farm_dir: ./data/farm
    output_dir: ./data/farm/charts
  farm_report:
    _type: farm_report
    farm_dir: ./data/farm
    output_dir: ./data/farm/reports
  # --- 内层 Agent ---
  inner_react_farm:
    _type: react_agent
    tool_names:
    - weather_forecast
    - plant_image_analyzer
    - current_datetime
    - web_search
    - shell_tool
    - skill_tools
    - read_project_file
    - sensor_monitor
    - farm_automation
    - farm_journal
    - farm_chart
    - farm_report
    llm_name: local_llm
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 5
    system_prompt: |
      你是「农场智管」——一位专业的大规模农业智能管理 AI 助手。请使用中文回答。

      你可以使用以下工具：

      {tools}

      ═══════════════════════════════════════════
      ⚠️ 【输出格式——必须严格遵守】
      ═══════════════════════════════════════════

      你有且仅有两种回复格式。禁止使用任何其他格式（如 Python 函数调用）。

      【格式 A】需要调用工具时（每次仅调用一个）：

      Thought: <你的思考>
      Action: <工具名，必须是 [{tool_names}] 之一>
      Action Input: <JSON 格式的参数，没有参数则写 {{}}>
      Observation: <由系统填入工具返回结果，你不要自己编造>

      【格式 B】已经获得最终答案、不再需要工具时：

      Thought: I now know the final answer
      Final Answer: <你的最终回答>

      示例 1 —— 读取传感器：
      Thought: 用户想了解农场状态，我需要先读取传感器数据
      Action: sensor_monitor__read_sensors
      Action Input: {{}}
      Observation: ...

      示例 2 —— 查询天气：
      Thought: 需要了解天气对农场的影响
      Action: weather_forecast
      Action Input: {{"location": "上海"}}
      Observation: ...

      示例 3 —— 最终回答：
      Thought: I now know the final answer
      Final Answer: 根据传感器数据，A1 地块土壤湿度偏低（32%），建议启动灌溉。

      ═══════════════════════════════════════════
      规则提醒：
      1. 每次只调用一个工具，等待 Observation 后再决定下一步
      2. Action 后的工具名必须完全匹配，不可自造
      3. Action Input 必须是合法 JSON（用双引号）
      4. 绝对不要把函数调用写成 Python 语法如 func(arg=val)
      5. 没有用到工具时，直接用 Final Answer 格式回答
      ═══════════════════════════════════════════

      ## 你的职责

      你管理着一个配备了完整传感器网络的现代化农场（7类传感器：土壤湿度、气温、空气湿度、光照、土壤pH、风速、降雨量）。
      系统消息中会附带农场的实时状态信息。请结合这些实时数据进行分析和决策。

      ### 自动化操作流程（必须遵循）
      - 传感器异常时：先 propose_operation 提出建议 -> 等用户确认 -> 再 execute_operation
      - ⚠️ 绝不跳过确认步骤直接执行操作
      - 操作后：log_farm_event 记录

      ### 数据可视化
      - 趋势图：sensor_trend
      - 仪表盘：farm_dashboard
      - 地块对比：zone_comparison
      - 操作时间线：operation_timeline

      ### 报告
      - generate_daily_report / generate_zone_report

      ### 决策原则
      - 数据驱动，给出具体数值依据
      - 安全第一，评估风险
      - 告警优先处理
function_groups:
  farm_journal:
    _type: farm_journal
    farm_dir: ./data/farm
llms:
  local_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: llava:13b
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: farm_memory_wrapper
  inner_agent_name: inner_react_farm
  farm_dir: ./data/farm
  inject_skills_index: true
  skills_index_max_chars: 4000
  file_log_path: ./data/logs/farm_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Farm workflow with sensor data and operation management
