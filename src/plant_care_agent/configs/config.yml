functions:
  plant_knowledge:
    _type: plant_knowledge
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  care_scheduler:
    _type: care_scheduler
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
    internal_base_url: "http://localhost:9000"  # 工具内部下载图片时使用，避免 hairpin NAT 问题
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  plant_chart:
    _type: plant_chart
    garden_dir: ./data/garden
    output_dir: ./data/charts
  growth_slides:
    _type: growth_slides
    garden_dir: ./data/garden
    charts_dir: ./data/charts
    output_dir: ./data/slides
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/garden
    - ./data
  plant_project:
    _type: plant_project
    garden_dir: ./data/garden
    default_latitude: 31.23
    default_longitude: 121.47
  plant_inspect_tools:
    _type: plant_inspect_tools
    garden_dir: ./data/garden
    default_latitude: 31.23
    default_longitude: 121.47
  inner_react:
    _type: react_agent
    tool_names:
    - plant_knowledge
    - weather_forecast
    - care_scheduler
    - plant_image_analyzer
    - growth_journal
    - current_datetime
    - web_search
    - shell_tool
    - plant_chart
    - growth_slides
    - skill_tools
    - read_project_file
    - plant_project
    - plant_inspect_tools
    llm_name: local_llm
    use_native_tool_calling: false
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 10
function_groups:
  growth_journal:
    _type: growth_journal
    journal_dir: ./data/garden
# ── LLM 配置 ─────────────────────────────────────────────────────────────────
# 同时支持「本地部署」和「外部 API」两种接入方式，按需选择：
#
#   本地部署（Ollama）：数据不出本机、零调用成本、离线可用
#   外部 API：零部署成本、可调用最新大参数模型
#
# 也可以混合使用，例如主对话走本地、图像诊断走外部 API。
# 切换时只需修改下方 api_key / base_url / model_name 即可。
# ─────────────────────────────────────────────────────────────────────────────
llms:
  local_llm:
    _type: openai
    # --- 方式一：本地部署（Ollama） ---
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    # --- 方式二：外部 API（取消注释并填入你的密钥） ---
    # api_key: sk-your-api-key-here
    # base_url: https://api.openai.com/v1          # OpenAI
    # base_url: https://api.deepseek.com/v1        # DeepSeek
    # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 阿里云百炼
    # model_name: gpt-4o                           # 或 deepseek-chat / qwen-plus 等
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    # --- 方式一：本地部署（Ollama） ---
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    # --- 方式二：外部 API ---
    # api_key: sk-your-api-key-here
    # base_url: https://api.openai.com/v1
    # model_name: gpt-4o
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: plant_memory_wrapper
  inner_agent_name: inner_react
  garden_dir: ./data/garden
  other_plants_max_events: 5
  inject_skills_index: true
  skills_index_max_chars: 4000
  inject_proactive_digest: false
  proactive_digest_max_chars: 3000
  inject_inspection: true
  inspection_max_chars: 4000
  default_latitude: 31.23
  default_longitude: 121.47
  background_inspection_enabled: true
  daily_digest_hour: 8
  emergency_check_interval_minutes: 120
  file_log_path: ./data/logs/plant_care_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Plant care workflow with sub-agent inspection and injected plant journals

# ── 静态文件存储（支持 multipart 图片上传）─────────────────────────────────
# 启用后 NAT 自动注册以下路由：
#   PUT    /static/{path}  上传文件（upsert，不冲突）
#   GET    /static/{path}  下载/访问文件
#   POST   /static/{path}  上传（key 已存在返回 409）
#   DELETE /static/{path}  删除文件
#
# 切换持久化存储只需改 object_stores.plant_image_store._type：
#   _type: s3      需安装 nvidia_nat_s3，配置 endpoint_url / access_key / secret_key / bucket_name
#   _type: redis   需安装 nvidia_nat_redis，配置 host / port / db / bucket_name
# ─────────────────────────────────────────────────────────────────────────────
general:
  front_end:
    _type: fastapi
    object_store: plant_image_store  # 引用下方 object_stores 中的名字

object_stores:
  plant_image_store:
    _type: in_memory  # 内存存储，无需额外依赖；重启后图片清空
