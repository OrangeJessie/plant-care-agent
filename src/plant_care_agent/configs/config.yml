functions:
  plant_knowledge:
    _type: plant_knowledge
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  care_scheduler:
    _type: care_scheduler
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  plant_chart:
    _type: plant_chart
    garden_dir: ./data/garden
  growth_slides:
    _type: growth_slides
    garden_dir: ./data/garden
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/garden
    - ./data
  plant_project:
    _type: plant_project
    garden_dir: ./data/garden
    default_latitude: 31.23
    default_longitude: 121.47
  plant_inspect_tools:
    _type: plant_inspect_tools
    garden_dir: ./data/garden
    default_latitude: 31.23
    default_longitude: 121.47
  inner_react:
    _type: react_agent
    tool_names:
    - plant_knowledge
    - weather_forecast
    - care_scheduler
    - plant_image_analyzer
    - growth_journal
    - current_datetime
    - web_search
    - shell_tool
    - plant_chart
    - growth_slides
    - skill_tools
    - read_project_file
    - plant_project
    - plant_inspect_tools
    llm_name: local_llm
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 5
    # system_prompt 由 prompts/ 目录统一管理，启动前自动组装到 .generated/ 目录。
    # 请勿手动编辑此字段。修改 prompts/*.md 后运行: python scripts/assemble_config.py --all
    # 或直接使用 ./scripts/start.sh 启动（自动 assemble）。
    system_prompt: __LOAD_FROM_PROMPTS__
function_groups:
  growth_journal:
    _type: growth_journal
    journal_dir: ./data/garden
llms:
  local_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: plant_memory_wrapper
  inner_agent_name: inner_react
  garden_dir: ./data/garden
  other_plants_max_events: 5
  inject_skills_index: true
  skills_index_max_chars: 4000
  inject_proactive_digest: false
  proactive_digest_max_chars: 3000
  inject_inspection: true
  inspection_max_chars: 4000
  default_latitude: 31.23
  default_longitude: 121.47
  background_inspection_enabled: true
  daily_digest_hour: 8
  emergency_check_interval_minutes: 120
  file_log_path: ./data/logs/plant_care_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Plant care workflow with sub-agent inspection and injected plant journals
