functions:
  plant_knowledge:
    _type: plant_knowledge
  weather_forecast:
    _type: weather_forecast
    default_latitude: 31.23
    default_longitude: 121.47
  care_scheduler:
    _type: care_scheduler
  plant_image_analyzer:
    _type: plant_image_analyzer
    vision_llm_name: vision_llm
  current_datetime:
    _type: current_datetime
  web_search:
    _type: web_search
    max_results: 5
    region: cn-zh
  shell_tool:
    _type: shell_tool
    working_dir: .
    timeout: 30
  plant_chart:
    _type: plant_chart
    garden_dir: ./data/garden
    output_dir: ./data/charts
  growth_slides:
    _type: growth_slides
    garden_dir: ./data/garden
    charts_dir: ./data/charts
    output_dir: ./data/slides
  skill_tools:
    _type: skill_tools
    load_max_chars: 12000
  read_project_file:
    _type: read_project_file
    max_bytes: 200000
    roots:
    - .
    - ./data/garden
    - ./data
  plant_project:
    _type: plant_project
    garden_dir: ./data/garden
    default_latitude: 31.23
    default_longitude: 121.47
  inner_react:
    _type: react_agent
    tool_names:
    - plant_knowledge
    - weather_forecast
    - care_scheduler
    - plant_image_analyzer
    - growth_journal
    - current_datetime
    - web_search
    - shell_tool
    - plant_chart
    - growth_slides
    - skill_tools
    - read_project_file
    - plant_project
    llm_name: local_llm
    verbose: true
    max_tool_calls: 20
    parse_agent_response_max_retries: 5
    system_prompt: |
      你是「花花助手」——一位专业的植物种植全流程 AI 助手。请使用中文回答。

      你可以使用以下工具：

      {tools}

      ═══════════════════════════════════════════
      ⚠️ 【输出格式——必须严格遵守】
      ═══════════════════════════════════════════

      你有且仅有两种回复格式。禁止使用任何其他格式（如 Python 函数调用）。

      【格式 A】需要调用工具时（每次仅调用一个）：

      Thought: <你的思考>
      Action: <工具名，必须是 [{tool_names}] 之一>
      Action Input: <JSON 格式的参数，没有参数则写 {{}}>
      Observation: <由系统填入工具返回结果，你不要自己编造>

      【格式 B】已经获得最终答案、不再需要工具时：

      Thought: I now know the final answer
      Final Answer: <你的最终回答>

      示例 1 —— 查询天气：
      Thought: 用户想了解上海天气，我需要调用 weather_forecast
      Action: weather_forecast
      Action Input: {{"location": "上海"}}
      Observation: ...

      示例 2 —— 记录种植事件：
      Thought: 用户种了栀子花，先用 growth_journal 的 log_event 记录
      Action: growth_journal__log_event
      Action Input: {{"entry": "栀子花 | 播种 | 今日种植栀子花"}}
      Observation: ...

      示例 3 —— 最终回答：
      Thought: I now know the final answer
      Final Answer: 栀子花喜酸性土壤，建议使用 pH 5.5-6.0 的腐殖土。

      ═══════════════════════════════════════════
      规则提醒：
      1. 每次只调用一个工具，等待 Observation 后再决定下一步
      2. Action 后的工具名必须完全匹配，不可自造
      3. Action Input 必须是合法 JSON（用双引号）
      4. 绝对不要把函数调用写成 Python 语法如 func(arg=val)
      5. 没有用到工具时，直接用 Final Answer 格式回答
      ═══════════════════════════════════════════

      ## 你的职责

      系统消息中会附带用户多株植物的「种植记忆」（Markdown 格式）。请结合这些记忆回答，避免重复追问已知信息。
      系统消息中还可能包含「子 Agent 巡检汇总」，请基于巡检结果主动给用户建议。

      ### 植物项目管理
      - 当用户说"种了/种植了/播种了 XXX"时：先 create_plant_project，再 log_event，再查信息给建议
      - 用户问"我的植物怎么样了"或"巡检一下"：用 inspect_all
      - 通用知识问题：直接回答

      ### 日常养护
      - 上传照片：plant_image_analyzer
      - 种植进展：growth_journal 的 log_event
      - 知识不足：web_search
      - 读项目文件：read_project_file

      ### 可视化
      - 图表：plant_chart
      - 幻灯片：growth_slides（先生成 chart）

      ### 回答风格
      - 中文回答，具体可操作
      - 适当使用 emoji
      - 时间敏感的建议先获取 current_datetime
function_groups:
  growth_journal:
    _type: growth_journal
    journal_dir: ./data/garden
llms:
  local_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: qwen3.5:35b
    temperature: 0.3
    max_tokens: 4096
  vision_llm:
    _type: openai
    api_key: EMPTY
    base_url: http://localhost:11434/v1
    model_name: llava:13b
    temperature: 0.2
    max_tokens: 4096
workflow:
  _type: plant_memory_wrapper
  inner_agent_name: inner_react
  garden_dir: ./data/garden
  other_plants_max_events: 5
  inject_skills_index: true
  skills_index_max_chars: 4000
  inject_proactive_digest: false
  proactive_digest_max_chars: 3000
  inject_inspection: true
  inspection_max_chars: 4000
  default_latitude: 31.23
  default_longitude: 121.47
  file_log_path: ./data/logs/plant_care_memory_log.md
  file_log_level: INFO
  conversation_memory_enabled: true
  conversation_store_dir: ./data/conversations
  conversation_auto_incremental: true
  description: Plant care workflow with sub-agent inspection and injected plant journals
